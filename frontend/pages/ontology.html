<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>本体确认 | 舆情预测</title>
  <script src="../js/api-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .panel { background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-lg); padding: 20px; }
    .panel-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
    .type-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .type-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border-radius: var(--radius-md); background: var(--surface-2); }
    .type-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); white-space: nowrap; margin-top: 2px; }
    .type-badge.entity { background: rgba(37,99,235,0.1); color: var(--primary); }
    .type-badge.edge { background: rgba(5,150,105,0.1); color: var(--success); }
    .type-desc { font-size: 13px; color: var(--ink-muted); line-height: 1.4; }
    .page-actions { margin-top: 24px; display: flex; gap: 12px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--ink-subtle); }
    .error { text-align: center; padding: 40px 20px; color: var(--error); }
    .attr-list { font-size: 12px; color: var(--ink-tertiary); margin-top: 4px; }
    .examples { font-size: 12px; color: var(--ink-tertiary); margin-top: 4px; font-style: italic; }
    .summary-box { background: var(--surface-2); border-radius: var(--radius-md); padding: 16px; font-size: 14px; line-height: 1.6; color: var(--ink-muted); }
    @media (max-width: 768px) { .panel-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">POF <span>系统</span></div></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>仪表盘</span></a>
        <a href="new-project.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>新建项目</span></a>
        <a href="history.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg><span>历史项目</span></a>
        <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.17 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.11 9.5a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 8.5 4.89a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H15a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>系统设置</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="topbar"><div class="topbar-title">本体确认</div></header>
      <div class="page-body" id="app">
        <div class="loading" id="loading">正在加载本体...</div>
        <div class="error" id="error" style="display:none"></div>
        <div id="content" style="display:none">
          <div class="card">
            <h3 style="margin-bottom:12px">分析摘要</h3>
            <div class="summary-box" id="summary"></div>
          </div>
          <div class="panel-row">
            <div class="panel">
              <h4 class="panel-title">实体类型（<span id="entityCount">0</span>）</h4>
              <ul class="type-list" id="entityList"></ul>
            </div>
            <div class="panel">
              <h4 class="panel-title">关系类型（<span id="edgeCount">0</span>）</h4>
              <ul class="type-list" id="edgeList"></ul>
            </div>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" id="buildBtn">构建图谱</button>
            <a href="new-project.html" class="btn btn-secondary">返回</a>
          </div>
          <div class="error" id="buildError" style="display:none;margin-top:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.API_BASE || 'http://127.0.0.1:5001';
    const params = new URLSearchParams(location.search);
    const projectId = params.get('id');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const content = document.getElementById('content');
    const buildBtn = document.getElementById('buildBtn');
    const buildError = document.getElementById('buildError');

    if (!projectId) {
      loading.style.display = 'none';
      error.style.display = 'block';
      error.textContent = '缺少项目 ID。请先创建项目。';
    } else {
      loadProject();
    }

    async function loadProject() {
      try {
        const res = await fetch(`${API}/api/graph/project/${projectId}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '加载项目失败');
        const project = data.data;

        if (project.status === 'graph_building' || project.status === 'graph_completed') {
          window.location.href = `graph.html?id=${projectId}`;
          return;
        }

        document.getElementById('summary').textContent = project.analysis_summary || '暂无摘要。';
        renderList('entityList', project.ontology?.entity_types || [], 'entity');
        renderList('edgeList', project.ontology?.edge_types || [], 'edge');
        document.getElementById('entityCount').textContent = (project.ontology?.entity_types || []).length;
        document.getElementById('edgeCount').textContent = (project.ontology?.edge_types || []).length;

        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = err.message;
      }
    }

    function renderList(containerId, items, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      if (!items.length) {
        container.innerHTML = '<li class="type-item"><span class="type-desc">无</span></li>';
        return;
      }
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'type-item';
        const desc = item.description || '';
        const attrs = (item.attributes || []).map(a => `${a.name}: ${a.type}`).join(', ');
        const examples = (item.examples || []).join(', ');
        let extra = '';
        if (attrs) extra += `<div class="attr-list">属性：${attrs}</div>`;
        if (examples) extra += `<div class="examples">示例：${examples}</div>`;
        li.innerHTML = `<span class="type-badge ${type}">${item.name}</span><div><div class="type-desc">${desc}</div>${extra}</div>`;
        container.appendChild(li);
      });
    }

    buildBtn.addEventListener('click', async () => {
      buildBtn.disabled = true;
      buildBtn.textContent = '启动中...';
      buildError.style.display = 'none';
      try {
        const res = await fetch(`${API}/api/graph/build`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: projectId, graph_name: document.getElementById('summary').textContent.slice(0, 50) || '图谱' })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = `graph.html?id=${projectId}`;
        } else {
          throw new Error(data.error || '构建失败');
        }
      } catch (err) {
        buildBtn.disabled = false;
        buildBtn.textContent = '构建图谱';
        buildError.style.display = 'block';
        buildError.textContent = err.message;
      }
    });
  </script>
</body>
</html>
